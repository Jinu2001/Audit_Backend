[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "nss",
  "nspr",
  "atk",
  "cups",
  "libdrm",
  "libxkbcommon",
  "mesa",
  "libgbm",
  "pango",
  "cairo",
  "alsa-lib",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "xorg.libXcursor",
  "xorg.libXi",
  "xorg.libXtst",
  "xorg.libXrender",
  "expat",
  "glib",
  "gtk3",
  "dbus"
]

[phases.install]
cmds = [
  "npm install",
  "npx playwright install chromium --with-deps"
]

[start]
cmd = "node server.js"
